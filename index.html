<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This-Salami</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="headerSection">
        <h1 id="header">This-Salami</h1>

        <p>Hey, I'm 
            <a class="external-link github" href="https://github.com/this-salami" target="_blank">this-salami</a> or
            <a class="external-link linkedin" href="https://linkedin.com/in/salman--amir" target="_blank">Salman Amir</a>,
            a passionate programmer and creator.
        </p>

        <p>Here is a collection of my projects and experiments. Explore my work in various programming languages and frameworks. Use the filters below to narrow down your search.</p>
    </div>
    
    <div id="filter-container" class="unselectable">
        <div class="multiselect">
            <div class="selectBox" onclick="showFilterList()">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="0" y="2" width="20" height="2" fill="black"></rect>
                    <circle cx="5" cy="3" r="2" stroke-width="2" stroke="black" fill="white"></circle>
                    <rect x="0" y="7" width="20" height="2" fill="black"></rect>
                    <circle cx="15" cy="8" r="2" stroke-width="2" stroke="black" fill="white"></circle>
                    <rect x="0" y="12" width="20" height="2" fill="black"></rect>
                    <circle cx="5" cy="13" r="2" stroke-width="2" stroke="black" fill="white"></circle>
                </svg>
                <span>Filters</span>
                <div class="overSelect"></div>
            </div>
            <div id="filter-box">
                <p id="key" class="tags">Legend: 
                    <span id="valid">optional</span> 
                    <span id="ignored" class="ignore">ignored</span> 
                    <span id="required" class="exclusive">required</span>
                </p> 
                
                <div id="filters" class="tags">
                    <!-- tags added w/ JS -->
                </div>
            </div>
        </div>
    </div>

    <div id="timeline-container" data-month-height="200">
        <div id="timeline" class="unselectable"></div>
        <div id="project-container"></div>
    </div>

    <script src="index.js"></script>
    <script src="filter.js"></script>
</body>
</html>
